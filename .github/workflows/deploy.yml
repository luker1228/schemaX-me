name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add front matter to markdown files
        run: |
          for f in $(find . -name "*.md" \
            ! -path "*/node_modules/*" \
            ! -path "*/vendor/*" \
            ! -path "./.codebuddy/*" \
            ! -path "./.baoyu-skills/*" \
            ! -path "./.claude/*" \
            ! -path "./.github/*"); do
            if [ "$(head -1 "$f")" != "---" ]; then
              { echo "---"; echo "---"; cat "$f"; } > "${f}.tmp" && mv "${f}.tmp" "$f"
            fi
          done
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
