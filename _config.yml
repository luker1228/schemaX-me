title: "Luke's AI Hub"
tagline: "从零构建理解 Agent 的旅程"
description: "AI 学习笔记、实践代码与工程思考"
url: "https://patientcat.github.io"
baseurl: "/aritcles-hub"

markdown: kramdown
highlighter: rouge

exclude:
  - "articles-draft/**"
  - node_modules
  - coscli_output
  - "*.bak"
  - "**/program/**"
  - "**/prompts/**"
  - README.md
  - CODEBUDDY.md
  - skills-lock.json
  - coscli
  - coscli.log
  - .codex
  - "**/.codex"
  - "**/outline.md"
  - "**/draft1.md"
  - "**/draft*.md"
  - "**/.codebuddy/**"
  - "**/.baoyu-skills/**"
  - "**/.claude/**"
  - "**/.github/**"
  - "**/.githooks/**"
  - Gemfile
  - Gemfile.lock
  - add-frontmatter.sh

collections:
  articles:
    output: true
    permalink: /articles/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: post
  - scope:
      path: "_articles"
      type: articles
    values:
      layout: post

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
