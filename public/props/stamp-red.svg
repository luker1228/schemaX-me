<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <defs>
    <filter id="inkBleed">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.06" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="stampEdge">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Stamp impression rotated -->
  <g transform="rotate(-5 100 60)" filter="url(#inkBleed)">
    <!-- Outer border rectangle, imperfect ink -->
    <rect x="16" y="14" width="168" height="92" rx="2" fill="none" stroke="#a81e16" stroke-width="4" opacity="0.85"/>
    <rect x="22" y="20" width="156" height="80" rx="1" fill="none" stroke="#a81e16" stroke-width="1.5" opacity="0.7"/>
    <!-- Ink fill with uneven opacity to simulate absorption -->
    <rect x="26" y="26" width="148" height="12" fill="#a81e16" opacity="0.12"/>
    <!-- TOP SECRET main text -->
    <text x="100" y="68" font-family="Arial Black, Impact, sans-serif" font-size="28" font-weight="900" letter-spacing="8" fill="#a81e16" text-anchor="middle" opacity="0.9">TOP SECRET</text>
    <!-- Subtext line -->
    <text x="100" y="84" font-family="Courier New, monospace" font-size="8.5" letter-spacing="3.5" fill="#a81e16" text-anchor="middle" opacity="0.7">INTEL ARCHIVE · RESTRICTED</text>
    <!-- Code line top -->
    <text x="100" y="36" font-family="Courier New, monospace" font-size="7.5" letter-spacing="2" fill="#a81e16" text-anchor="middle" opacity="0.55">FN-2084 · CLASS-A · NO COPY</text>
    <!-- Corner marks -->
    <line x1="16" y1="28" x2="26" y2="28" stroke="#a81e16" stroke-width="2" opacity="0.6"/>
    <line x1="16" y1="92" x2="26" y2="92" stroke="#a81e16" stroke-width="2" opacity="0.6"/>
    <line x1="174" y1="28" x2="184" y2="28" stroke="#a81e16" stroke-width="2" opacity="0.6"/>
    <line x1="174" y1="92" x2="184" y2="92" stroke="#a81e16" stroke-width="2" opacity="0.6"/>
    <!-- Ink dropout spots (lighter patches simulating uneven absorption) -->
    <rect x="40" y="52" width="18" height="22" fill="#1a0f0e" opacity="0.06"/>
    <rect x="130" y="56" width="22" height="16" fill="#1a0f0e" opacity="0.08"/>
    <rect x="80" y="42" width="12" height="8" fill="#1a0f0e" opacity="0.05"/>
  </g>
</svg>
